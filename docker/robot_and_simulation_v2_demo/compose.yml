services:
  sas_kuka_control_template:
    build: https://github.com/MarinhoLab/sas_kuka_control_template.git#main:docker/sas_kuka_control_template
    stop_signal: SIGINT
    stop_grace_period: 1m
    network_mode: "host" # Reverse connection with UR robot
    volumes:
      - sas-kuka-control-template-repo-data:/root/sas_tutorial_workspace/src/sas_kuka_control_template/
    environment:
      - ROS_DOMAIN_ID
    cap_add:
      - SYS_NICE # PREEMPT_RT
    ulimits:
      rtprio: 99 # PREEMPT_RT
      rttime: -1 # PREEMPT_RT
    command: /bin/bash -c "
      cd /root/sas_tutorial_workspace/src/sas_kuka_control_template/docker/scripts
      && chmod +x prepare_robot_demo.sh
      && . ./prepare_robot_demo.sh
      && ros2 launch sas_kuka_control_template robot_and_simulation_v2_example_py_launch.py"

  coppeliasim:
    image: murilomarinho/coppeliasim:latest
    stop_signal: SIGINT
    platform: linux/amd64 # No current build for arm64
    environment:
      - DISPLAY
      - ROS_DOMAIN_ID
      - COPPELIA_SIM_SCENE_FILE=KUKAR820_4100rev0_sas.ttt
      - COPPELIA_SIM_CONTAINER_SCENE_PATH=/root/sas_tutorial_workspace/src/sas_kuka_control_template/scenes/
    privileged: true # Needed for some gpu configurations.
    volumes:
      - sas-kuka-control-template-repo-data:/root/sas_tutorial_workspace/src/sas_kuka_control_template/
      - /tmp/.X11-unix:/tmp/.X11-unix # x server related
      - ~/.Xauthority:/root/.Xauthority # x server related
    command: /bin/bash -c "
      ls "$$COPPELIA_SIM_CONTAINER_SCENE_PATH"
      && sudo apt-get update && sudo apt-get upgrade -y
      && [ -f "$$COPPELIA_SIM_CONTAINER_SCENE_PATH/$$COPPELIA_SIM_SCENE_FILE" ]
      && cd "$$COPPELIASIM_PATH"
      && ./coppeliaSim.sh 
      -s0 \
      "$$COPPELIA_SIM_CONTAINER_SCENE_PATH/$$COPPELIA_SIM_SCENE_FILE""

volumes:
  sas-kuka-control-template-repo-data:
